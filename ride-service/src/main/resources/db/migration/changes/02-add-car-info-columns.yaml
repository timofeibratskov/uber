databaseChangeLog:
  - changeSet:
      id: 02-add-car-info-columns.yaml
      author: user
      changes:
        - addColumn:
            tableName: ride_table
            columns:
              - column:
                  name: driver_name
                  type: varchar(255)
              - column:
                  name: car_id
                  type: UUID
              - column:
                  name: car_license_plate
                  type: varchar(255)
              - column:
                  name: car_model
                  type: varchar(255)
              - column:
                  name: car_brand
                  type: varchar(255)
              - column:
                  name: car_color
                  type: varchar(255)