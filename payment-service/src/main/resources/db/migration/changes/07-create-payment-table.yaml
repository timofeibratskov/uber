databaseChangeLog:
  - changeSet:
      id: 07-create-payment-table.yaml
      author: user
      changes:
        - createTable:
            tableName: payments_table
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: ride_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: payment_method_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: payment_status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: intent_id
                  type: text
