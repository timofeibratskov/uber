databaseChangeLog:
  - changeSet:
      id: 08-modify-payment_transaction_table.yaml
      author: user
      changes:
        - dropColumn:
            tableName: payment_transactions_table
            columnName: ride_id

        - renameColumn:
            tableName: payment_transactions_table
            oldColumnName: passenger_id
            newColumnName: payment_method_id
            columnDataType: UUID

        - addColumn:
            tableName: payment_transactions_table
            columns:
              - column:
                  name: payment_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transactions_to_payments
                    referencedTableName: payments_table
                    referencedColumnNames: id
              - column:
                  name: charge_id
                  type: TEXT
              - column:
                  name: transaction_type
                  type: varchar(50)
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: payment_transactions_table
            baseColumnNames: payment_method_id
            constraintName: fk_transactions_to_payment_methods
            referencedTableName: payment_methods_table
            referencedColumnNames: id
            onDelete: RESTRICT