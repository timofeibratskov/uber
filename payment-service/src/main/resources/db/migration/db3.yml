databaseChangeLog:
  - changeSet:
      id: 1
      author: timofei
      changes:
        - createSequence:
            sequenceName: card_id_seq
            startValue: 1
            incrementBy: 1
        - createTable:
            tableName: card
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: card_id_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: card_number
                  type: VARCHAR(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: balance
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2
      author: timofei
      changes:
        - createSequence:
            sequenceName: transaction_id_seq
            startValue: 1
            incrementBy: 1
        - createTable:
            tableName: transaction
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueSequenceNext: transaction_id_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sender_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    references: card(id)
                    foreignKeyName: fk_transaction_sender
              - column:
                  name: recipient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    references: card(id)
                    foreignKeyName: fk_transaction_recipient
              - column:
                  name: amount
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: transaction_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: transaction_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: ride_id
                  type: VARCHAR(255)
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false