spring:
  liquibase:
    change-log: classpath:db/migration/changelog-master.yaml

  Kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: driver-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  data:
    redis:
      host: localhost
      port: 6379
      password: 1111
      connect-timeout: 2s
      client-name: driver-service
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  datasource:
    url: jdbc:postgresql://localhost:5551/driver_db
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  application:
    name: driver-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-handlers-package: com.example.driver_service.config.mybatis
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8881

app:
  Kafka:
    ride-topic: "ride_events_topic"