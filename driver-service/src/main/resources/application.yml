spring:
  liquibase:
    change-log: classpath:db/migration/changelog-master.yaml

  data:
    redis:
      host: localhost
      port: 6379
      password: 1111
      connect-timeout: 2s
      client-name: driver-service
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  datasource:
    url: jdbc:postgresql://localhost:5551/driver_db
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

mybatis:
  type-handlers-package: com.example.driver_service.config.mybatis
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8881