databaseChangeLog:
  - changeSet:
      id: 1
      author: timofei
      changes:
        - createTable:
            tableName: drivers
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: gmail
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone_number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: rating
                  type: REAL
                  constraints:
                    nullable: false
                    checkConstraint: "rating BETWEEN 0 AND 5"
                  defaultValue: 0.0

  - changeSet:
      id: 2
      author: timofei
      changes:
        - createTable:
            tableName: cars
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: driver_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_car_driver
                    references: drivers(id)
                    deleteCascade: false
              - column:
                  name: color
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: license_plate
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: brand
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: seats
                  type: SMALLINT
                  constraints:
                    nullable: false
                    checkConstraint: "seats > 0"
